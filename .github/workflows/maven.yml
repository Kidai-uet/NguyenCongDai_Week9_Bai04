name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 1. Khai báo chiến lược Ma trận (Matrix Strategy)
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # 2. Bắt máy ảo chạy theo danh sách hệ điều hành ở trên
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build dự án với Maven
        run: mvn -B package --file pom.xml

      # 3. Đổi tên file Artifact
      - name: Lưu trữ file JAR
        uses: actions/upload-artifact@v4
        with:
          name: BankSystem-Artifact-${{ matrix.os }}
          path: target/*.jar